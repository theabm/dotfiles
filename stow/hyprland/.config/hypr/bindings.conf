# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Launchers and shell tools
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, B, exec, firefox
bind = $mainMod, SPACE, exec, noctalia-shell ipc call launcher toggle
bind = $mainMod, W, exec, noctalia-shell ipc call plugin:web-search toggle
bind = $mainMod, C, exec, noctalia-shell ipc call plugin:screenshot takeScreenshot region

bind = $mainMod, F10, exec, sh -lc 'if systemctl --user is-active --quiet voxtype.service; then systemctl --user stop voxtype.service; else systemctl --user start voxtype.service; fi'

# Window state
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod CTRL, F, fullscreenstate, 2 0

# Cycle through the windows inside the current workspace/layout.
bind = $mainMod, Tab, layoutmsg, focus r
bind = $mainMod SHIFT, Tab, layoutmsg, focus l
bind = $mainMod, BackSpace, focuscurrentorlast,

# Scrolling layout controls.
bind = $mainMod, O, layoutmsg, togglefit

################################ Tape SUBMAP - DO NOT INSERT BINDINGS HERE ########################
bind = $mainMod, T, submap, tape
submap = tape
bind =, H, layoutmsg, move -col
bind =, L, layoutmsg, move +col
bind = SHIFT, H, layoutmsg, swapcol l
bind = SHIFT, L, layoutmsg, swapcol r
bind =, J, layoutmsg, colresize -conf
bind =, K, layoutmsg, colresize +conf
bind =, P, layoutmsg, promote
bind =, F, layoutmsg, fit active
bind =, V, layoutmsg, fit visible
bind =, A, layoutmsg, fit all
bind =, C, layoutmsg, togglefit
bind =, escape, submap, reset
submap = reset
###################################################################################################

################################ Group SUBMAP - DO NOT INSERT BINDINGS HERE #######################
bind = $mainMod, G, submap, group
submap = group
bind =, G, togglegroup,
bind =, G, submap, reset
bind =, A, exec, ~/.config/hypr/scripts/group-workspace.sh group
bind =, A, submap, reset
bind =, U, exec, ~/.config/hypr/scripts/group-workspace.sh ungroup-active
bind =, U, submap, reset
bind =, N, changegroupactive, f
bind =, P, changegroupactive, b
bind =, L, lockactivegroup, toggle
bind =, L, submap, reset
bind =, escape, submap, reset
submap = reset
###################################################################################################

############### Hyprland SUBMAP - DO NOT INSERT BINDINGS HERE #####################################
bind = $mainMod, E, submap, hyprland
submap = hyprland
bind =, L, exec, hyprlock
bind =, L, submap, reset 
bind =, R, exec, hyprctl reload
bind =, R, submap, reset
bind =, escape, submap, reset 
submap = reset
###################################################################################################

################################ Resize SUBMAP - DO NOT INSERT BINDINGS HERE ######################
bind = $mainMod, R, submap, resize
# will start a submap called "resize"
submap = resize
# sets repeatable binds for resizing the active window
binde = , H, moveactive, -10 0
binde = , J, moveactive, 0 10
binde = , K, moveactive, 0 -10
binde = , L, moveactive, 10 0

binde = , left, resizeactive, -10 0
binde = , down, resizeactive, 0 10
binde = , up, resizeactive, 0 -10
binde = , right, resizeactive, 10 0

binde = , c, centerwindow,

# use reset to go back to the global submap
bind = , escape, submap, reset 
# will reset the submap, which will return to the global submap
submap = reset
###################################################################################################

# Move focus with mainMod + vim-style directions
bind = $mainMod, H, layoutmsg, focus l
bind = $mainMod, L, layoutmsg, focus r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# move windows out or into groups in specific directions
bind = $mainMod SHIFT, H, movewindoworgroup, l
bind = $mainMod SHIFT, J, movewindoworgroup, d
bind = $mainMod SHIFT, K, movewindoworgroup, u
bind = $mainMod SHIFT, L, movewindoworgroup, r

################################ Monitor SUBMAP - DO NOT INSERT BINDINGS HERE #####################
bind = $mainMod, M, submap, monitor
submap = monitor
bind = , H, movecurrentworkspacetomonitor, l
bind = , H, submap, reset

bind = , J, movecurrentworkspacetomonitor, d
bind = , J, submap, reset

bind = , K, movecurrentworkspacetomonitor, u
bind = , K, submap, reset

bind = , L, movecurrentworkspacetomonitor, r
bind = , L, submap, reset

bind =, Q, exec, hyprlock
bind =, Q, submap, reset 

bind = , R, exec, ~/.config/hypr/hypr-monitor-setup.sh
bind = , R, exec, source ~/.config/hypr/monitors_active.conf
bind = , R, exec, hyprctl reload
bind = , R, submap, reset

bind = , escape, submap, reset 
submap = reset
###################################################################################################

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, focusworkspaceoncurrentmonitor, 1
bind = $mainMod, 2, focusworkspaceoncurrentmonitor, 2
bind = $mainMod, 3, focusworkspaceoncurrentmonitor, 3
bind = $mainMod, 4, focusworkspaceoncurrentmonitor, 4
bind = $mainMod, 5, focusworkspaceoncurrentmonitor, 5
bind = $mainMod, 6, focusworkspaceoncurrentmonitor, 6
bind = $mainMod, 7, focusworkspaceoncurrentmonitor, 7
bind = $mainMod, 8, focusworkspaceoncurrentmonitor, 8
bind = $mainMod, 9, focusworkspaceoncurrentmonitor, 9
bind = $mainMod, 0, focusworkspaceoncurrentmonitor, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move active window to a workspace without following it.
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Push-to-talk: hold Super+V to record, release to transcribe
bind = $mainMod, V, exec, voxtype record start
bindr = $mainMod, V, exec, voxtype record stop
